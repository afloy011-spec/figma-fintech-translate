# Copy this file to .github/workflows/ci.yml in the repo root to enable GitHub Actions.
# (Some git credentials cannot push new workflow files without the "workflow" OAuth scope;
# creating the file once in the GitHub UI works too.)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
